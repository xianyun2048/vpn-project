[Interface]
# 服务器内部 VPN 子网 (自行选定)
Address = 10.10.0.1/24
# 这里的 ListenPort 其实不会被外界直接访问，因为 udp2raw 已把 TCP 443 转给本地 51820
ListenPort = 51820
MTU = 1300
PrivateKey = <SERVER_PRIVATE_KEY>   # 下面会生成

# ---------- NAT ----------
# ① 让通过 wg0 的流量走宿主机外网
# ② 这里的 iptables 规则在 udp2raw -a 参数启动后会自动创建，若去掉 -a，请手动保留以下两行
PostUp = iptables -t nat -A POSTROUTING -o $(ip route get 8.8.8.8 | awk '{print $5}') -j MASQUERADE
PostDown = iptables -t nat -D POSTROUTING -o $(ip route get 8.8.8.8 | awk '{print $5}') -j MASQUERADE
