version: "3.9"

services:
  # ======== VPN 服务（WireGuard + udp2raw）========
  wg-vpn:
    build: ./wg-server
    container_name: wg-vpn
    privileged: true                     # 需要 raw socket 权限
    cap_add:
      - NET_ADMIN                         # iptables、路由操作
      - NET_RAW                           # raw socket 使用
    network_mode: host                   # 使用宿主机网络栈（必须）
    environment:
      # 在 .env 中可统一管理
      UDP2RAW_PASSWORD: ${UDP2RAW_PASSWORD}
    volumes:
      - ./wg-data:/etc/wireguard         # 持久化 WG 配置 & 密钥
    restart: unless-stopped

  # ======== 可选的 Web 管理 UI ========
  wg-admin:
    build: ./wg-admin
    container_name: wg-admin
    ports:
      - "5000:5000"                      # 本机 5000 端口对外（可加 Nginx 反向代理）
    environment:
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ./wg-data:/etc/wireguard         # 共享同一卷，直接读写 wg0.conf
    depends_on:
      - wg-vpn
    restart: unless-stopped