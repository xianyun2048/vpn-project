version: "3.9"

services:
  wg-vpn:
    build: ./wg-server               # 上面修正后的 Dockerfile
    container_name: wg-vpn
    privileged: true                 # 允许 raw‑socket 与 iptables
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host               # 直接使用宿主机网络（必须）
    environment:
      UDP2RAW_PASSWORD: ${UDP2RAW_PASSWORD}   # 与客户端保持一致
    volumes:
      - ./wg-data:/etc/wireguard      # 持久化 wg0.conf、密钥
    restart: unless-stopped


  #  Web 管理 UI
  wg-admin:
    build: ./wg-admin
    container_name: wg-admin
    ports:
      - "5000:5000"                      # 本机 5000 端口对外（可加 Nginx 反向代理）
    environment:
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ./wg-data:/etc/wireguard         # 共享同一卷，直接读写 wg0.conf
    depends_on:
      - wg-vpn
    restart: unless-stopped